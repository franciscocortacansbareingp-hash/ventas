<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Barein Dashboard | Multi-Filtro</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0a; --surface: #141414; --border: #262626; 
            --text: #f0f0f0; --muted: #a0a0a0; --accent: #6366f1;
        }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; overflow-x: hidden; }
        .nav { background: var(--surface); border-bottom: 1px solid var(--border); padding: 15px 25px; display: flex; gap: 20px; align-items: flex-end; position: sticky; top: 0; z-index: 1000; }
        
        .filter-group { display: flex; flex-direction: column; gap: 5px; }
        .filter-label { font-size: 10px; color: var(--accent); font-weight: 800; text-transform: uppercase; letter-spacing: 0.5px; }
        
        input, select { background: var(--bg); border: 1px solid var(--border); color: var(--text); padding: 10px; border-radius: 8px; font-size: 13px; outline: none; }

        /* Estilo Dropdown Multi-Select */
        .multiselect { position: relative; width: 220px; }
        .selectBox { position: relative; cursor: pointer; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 10px; font-size: 13px; }
        .overSelect { position: absolute; left: 0; right: 0; top: 0; bottom: 0; }
        #checkboxes { 
            display: none; border: 1px solid var(--border); background: var(--surface); 
            position: absolute; width: 100%; z-index: 1001; border-radius: 8px; margin-top: 5px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.5);
        }
        #checkboxes label { display: flex; align-items: center; padding: 10px; font-size: 13px; cursor: pointer; transition: 0.2s; }
        #checkboxes label:hover { background: rgba(99, 102, 241, 0.1); color: var(--accent); }
        #checkboxes input { margin-right: 10px; width: auto; }

        .search-box { flex-grow: 1; }
        .search-box input { width: 100%; }

        .container { max-width: 1400px; margin: 30px auto; padding: 0 20px; }
        .grid-kpi { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 20px; margin-bottom: 40px; }
        .card { background: var(--surface); padding: 25px; border-radius: 16px; border: 1px solid var(--border); }
        .value { font-size: 1.8rem; font-weight: 800; color: var(--text); margin: 5px 0; }
        .sub-value { color: var(--accent); font-size: 0.9rem; font-weight: 600; }
        
        .table-container { background: var(--surface); border-radius: 16px; border: 1px solid var(--border); overflow: hidden; margin-bottom: 30px; }
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 15px 20px; font-size: 11px; color: var(--muted); border-bottom: 1px solid var(--border); background: rgba(255,255,255,0.02); }
        td { padding: 15px 20px; border-bottom: 1px solid var(--border); font-size: 14px; }
        .num { text-align: right; font-weight: 700; }
        .tag { background: var(--accent); color: white; padding: 3px 7px; border-radius: 5px; font-size: 11px; font-weight: 700; }
    </style>
</head>
<body>

<div class="nav">
    <div class="filter-group">
        <span class="filter-label">Mes</span>
        <select id="mesSelector" style="width: 130px;"></select>
    </div>

    <div class="filter-group">
        <span class="filter-label">Actividades</span>
        <div class="multiselect">
            <div class="selectBox" onclick="toggleCheckboxes()">
                <div id="selectedDisplay">Mostrador, Empresa...</div>
                <div class="overSelect"></div>
            </div>
            <div id="checkboxes">
                <label><input type="checkbox" value="1" checked onchange="update()"> 1 - Mostrador</label>
                <label><input type="checkbox" value="5" checked onchange="update()"> 5 - Empresa</label>
                <label><input type="checkbox" value="10" onchange="update()"> 10 - Reventa</label>
                <label><input type="checkbox" value="15" onchange="update()"> 15 - Seguros</label>
                <label><input type="checkbox" value="20" onchange="update()"> 20 - Competición</label>
                <label><input type="checkbox" value="30" onchange="update()"> 30 - Marketplace</label>
                <label><input type="checkbox" value="40" onchange="update()"> 40 - Redes</label>
                <label><input type="checkbox" value="50" onchange="update()"> 50 - Logística</label>
                <label><input type="checkbox" value="NADA" onchange="update()"> Sin Identificar</label>
            </div>
        </div>
    </div>

    <div class="filter-group search-box">
        <span class="filter-label">Buscador</span>
        <input type="text" id="searchInput" placeholder="Marca, rodado o descripción...">
    </div>
</div>

<div class="container">
    <div class="grid-kpi">
        <div class="card"><div class="filter-label">Facturación Total</div><div id="kpiFact" class="value">$ 0</div></div>
        <div class="card"><div class="filter-label">Neumáticos</div><div id="kpiCant" class="value">0 u.</div><div id="kpiFactNeu" class="sub-value">$ 0</div></div>
        <div class="card"><div class="filter-label">Servicios</div><div id="kpiServ" class="value">$ 0</div><div id="kpiIncid" class="sub-value">0% Incidencia</div></div>
    </div>

    <div class="table-container">
        <table>
            <thead><tr><th>Rodado</th><th class="num">Unidades</th><th class="num">Total Facturado</th></tr></thead>
            <tbody id="tablaRodados"></tbody>
        </table>
    </div>
</div>

<script>
    const URL_PUB = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSCmHe-75PjLOZxC8rj9ZiRx58SU0crBtp9FGokKFYUIN3FSONy7091EQPrVZWmHrkuXEuK-rg3uCx4/pub?output=csv';
    let rawData = [];
    let expanded = false;

    function toggleCheckboxes() {
        const checkboxes = document.getElementById("checkboxes");
        checkboxes.style.display = expanded ? "none" : "block";
        expanded = !expanded;
    }

    // Cerrar el menú si se hace click afuera
    document.addEventListener('click', function(e) {
        const multiselect = document.querySelector('.multiselect');
        if (!multiselect.contains(e.target)) {
            document.getElementById("checkboxes").style.display = "none";
            expanded = false;
        }
    });

    function parseNum(v) {
        if (!v || v === "" || v === "-" || v === " ") return 0;
        let s = String(v).trim().replace(/[$\s]/g, '');
        if (s.includes(',') && s.includes('.')) s = s.replace(/\./g, '').replace(',', '.');
        else if (s.includes(',')) s = s.replace(',', '.');
        let n = parseFloat(s);
        return isNaN(n) ? 0 : n;
    }

    const fmt = (n) => '$ ' + Math.floor(n).toLocaleString('es-AR');
    const fmtNum = (n) => n.toLocaleString('es-AR');

    function init() {
        Papa.parse(URL_PUB, {
            download: true,
            header: false,
            complete: (results) => {
                rawData = results.data;
                const meses = [...new Set(rawData.map(r => String(r[14] || "").trim()))].filter(m => m && m.toLowerCase() !== 'mes');
                const selMes = document.getElementById('mesSelector');
                selMes.innerHTML = meses.map(m => `<option value="${m}">${m}</option>`).join('');
                selMes.addEventListener('change', update);
                document.getElementById('searchInput').addEventListener('input', update);
                update();
            }
        });
    }

    function update() {
        const mesSel = document.getElementById('mesSelector').value;
        const search = document.getElementById('searchInput').value.toLowerCase().trim();
        const tokens = search.split(' ').filter(t => t !== '');
        
        // Obtener valores de los checkboxes tildados
        const checkedBoxes = Array.from(document.querySelectorAll('#checkboxes input:checked')).map(cb => cb.value);
        document.getElementById('selectedDisplay').innerText = checkedBoxes.length > 0 ? `Seleccionados: ${checkedBoxes.length}` : "Ninguno";

        let kpi = { f: 0, c: 0, fn: 0, s: 0 };
        let rData = {};

        rawData.forEach((row, index) => {
            if (index === 0 || row.length < 15) return;
            if (String(row[14] || "").trim() !== mesSel) return;

            const actRow = String(row[8] || "").trim();
            const valorActRow = (actRow === "" || actRow === "0") ? "NADA" : actRow;
            if (!checkedBoxes.includes(valorActRow)) return;

            const fullText = `${row[16]} ${row[9]} ${row[11]}`.toLowerCase();
            if (!tokens.every(t => fullText.includes(t))) return;

            const imp = parseNum(row[6]);
            const can = parseFloat(String(row[5]).replace(',', '.')) || 0;
            const esServicio = String(row[10]).trim().toUpperCase() === "A_SERVICIO";
            const rodado = String(row[11] || "").trim();

            kpi.f += imp;
            if (!esServicio && rodado !== "" && rodado !== "0") {
                kpi.c += can;
                kpi.fn += imp;
                if (!rData[rodado]) rData[rodado] = { c: 0, f: 0 };
                rData[rodado].c += can;
                rData[rodado].f += imp;
            }
            if (esServicio) kpi.s += imp;
        });

        document.getElementById('kpiFact').innerText = fmt(kpi.f);
        document.getElementById('kpiCant').innerText = fmtNum(kpi.c) + ' u.';
        document.getElementById('kpiFactNeu').innerText = fmt(kpi.fn);
        document.getElementById('kpiServ').innerText = fmt(kpi.s);
        document.getElementById('kpiIncid').innerText = (kpi.f > 0 ? (kpi.s / kpi.f * 100).toFixed(1) : 0) + '% Incidencia';

        document.getElementById('tablaRodados').innerHTML = Object.entries(rData)
            .sort((a,b) => parseInt(a[0]) - parseInt(b[0]))
            .map(([r, v]) => `<tr><td><span class="tag">R${r}</span></td><td class="num">${fmtNum(v.c)} u.</td><td class="num">${fmt(v.f)}</td></tr>`).join('');
    }
    init();
</script>
</body>
</html>
