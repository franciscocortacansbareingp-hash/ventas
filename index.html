<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Barein Ventas - Dashboard</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0a; --surface: #141414; --border: #262626; 
            --text: #f0f0f0; --muted: #a0a0a0; --accent: #6366f1;
        }
        .light-mode {
            --bg: #f5f5f7; --surface: #ffffff; --border: #e0e0e0; 
            --text: #1d1d1f; --muted: #6e6e73; --accent: #4f46e5;
        }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; transition: background 0.3s; }
        
        /* Navbar */
        .nav { background: var(--surface); border-bottom: 1px solid var(--border); padding: 15px 25px; position: sticky; top: 0; z-index: 100; }
        .nav-container { max-width: 1400px; margin: auto; display: flex; gap: 20px; align-items: center; flex-wrap: wrap; }
        .search-box { flex-grow: 1; min-width: 300px; }
        input, select { background: var(--bg); border: 1px solid var(--border); color: var(--text); padding: 12px 15px; border-radius: 8px; outline: none; font-size: 14px; font-family: 'Inter', sans-serif; width: 100%; box-sizing: border-box; }
        
        /* Tabs */
        .tabs { display: flex; justify-content: center; gap: 10px; margin: 25px 0; }
        .tab-btn { background: none; border: none; color: var(--muted); padding: 12px 24px; font-weight: 700; cursor: pointer; border-bottom: 2px solid transparent; font-family: 'Inter', sans-serif; font-size: 13px; letter-spacing: 0.5px; }
        .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }

        .container { max-width: 1400px; margin: 0 auto 50px; padding: 0 20px; }
        .page { display: none; }
        .page.active { display: block; }

        /* KPIs Estilo image_fdc744.png */
        .grid-kpi { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; margin-bottom: 40px; }
        .card { background: var(--surface); padding: 30px; border-radius: 16px; border: 1px solid var(--border); position: relative; overflow: hidden; }
        .label { font-size: 11px; font-weight: 800; color: var(--muted); text-transform: uppercase; letter-spacing: 1.2px; margin-bottom: 15px; display: block; }
        .value { font-size: 2.2rem; font-weight: 800; color: var(--text); line-height: 1; word-break: break-all; }
        .sub-value { font-size: 1.1rem; font-weight: 600; margin-top: 10px; color: var(--muted); display: block; }

        /* Tablas */
        .section-header { margin: 40px 0 20px; display: flex; align-items: center; gap: 15px; }
        .section-header h3 { margin: 0; font-size: 1.1rem; text-transform: uppercase; font-weight: 700; color: var(--accent); }
        .line { height: 1px; background: var(--border); flex-grow: 1; }
        
        .table-container { background: var(--surface); border-radius: 16px; border: 1px solid var(--border); overflow: hidden; }
        table { width: 100%; border-collapse: collapse; table-layout: fixed; }
        th { background: rgba(255,255,255,0.02); padding: 15px 20px; text-align: left; font-size: 11px; color: var(--muted); text-transform: uppercase; font-weight: 700; }
        td { padding: 15px 20px; border-bottom: 1px solid var(--border); font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .num { text-align: right; font-weight: 700; width: 180px; }
        .tag { background: var(--accent); color: white; padding: 4px 8px; border-radius: 6px; font-size: 11px; font-weight: 700; }

        @media (max-width: 768px) { .value { font-size: 1.8rem; } }
    </style>
</head>
<body>

<div class="nav">
    <div class="nav-container">
        <h2 style="margin:0; font-size: 1.2rem; font-weight: 800; color: var(--accent);">BAREIN <span style="color:var(--text); font-weight: 300;">DASHBOARD</span></h2>
        <div style="width: 150px;"><select id="mesSelector"><option>Mes...</option></select></div>
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Buscá por medida (175 70 13), marca o descripción...">
        </div>
        <button onclick="document.body.classList.toggle('light-mode')" style="background:none; border:none; cursor:pointer; font-size: 1.2rem;">🌓</button>
    </div>
</div>

<div class="tabs">
    <button class="tab-btn active" onclick="switchTab('general')">PERFORMANCE GENERAL</button>
    <button class="tab-btn" onclick="switchTab('detallado')">DETALLE DE PRODUCTOS</button>
</div>

<div class="container">
    <!-- SOLAPA 1: GENERAL -->
    <div id="general" class="page active">
        <div class="grid-kpi">
            <div class="card">
                <span class="label">Facturación Total</span>
                <div id="kpiFact" class="value">$ 0</div>
            </div>
            <div class="card">
                <span class="label">Volumen Neumáticos</span>
                <div id="kpiCant" class="value">0 u.</div>
                <div id="kpiFactNeu" class="sub-value">$ 0</div>
            </div>
            <div class="card">
                <span class="label">Ticket Promedio</span>
                <div id="kpiProm" class="value">$ 0</div>
            </div>
            <div class="card">
                <span class="label">Venta de Servicios</span>
                <div id="kpiServ" class="value">$ 0</div>
            </div>
        </div>

        <div class="section-header"><h3>Top 10 Marcas por Facturación</h3><div class="line"></div></div>
        <div class="table-container">
            <table id="tablaMarcasHome">
                <thead><tr><th>Marca</th><th class="num">Participación</th><th class="num">Total Facturado</th></tr></thead>
                <tbody></tbody>
            </table>
        </div>
    </div>

    <!-- SOLAPA 2: DETALLADO -->
    <div id="detallado" class="page">
        <div class="section-header"><h3>Ventas por Rodado</h3><div class="line"></div></div>
        <div class="table-container" style="margin-bottom: 40px;">
            <table id="tablaRodados">
                <thead><tr><th>Rodado</th><th class="num">Unidades</th><th class="num">Total ML</th></tr></thead>
                <tbody></tbody>
            </table>
        </div>
        
        <div class="section-header"><h3>Ranking Completo de Marcas</h3><div class="line"></div></div>
        <div class="table-container">
            <table id="tablaMarcasFull">
                <thead><tr><th>Marca</th><th class="num">Unidades</th><th class="num">Total Facturado</th></tr></thead>
                <tbody></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    const SHEET_URL = 'https://docs.google.com/spreadsheets/d/1gddLz0WmuvjDPicMY4O5uhQpe0tOL8wFmMtYzuIBi5g/export?format=csv';
    let rawData = [];

    function init() {
        Papa.parse(SHEET_URL, {
            download: true,
            complete: (results) => {
                rawData = results.data;
                const meses = [...new Set(rawData.map(r => String(r[14]).trim()))].filter(m => m && m.toLowerCase() !== 'mes');
                const sel = document.getElementById('mesSelector');
                sel.innerHTML = meses.map(m => `<option value="${m}">${m}</option>`).join('');
                sel.addEventListener('change', update);
                document.getElementById('searchInput').addEventListener('input', update);
                update();
            }
        });
    }

    function parseNum(v) { if(!v) return 0; return parseFloat(String(v).replace(/[$\s]/g, '').replace(/,/g, '')) || 0; }
    
    // El "Limpiador" Mágico: saca todo lo que no sea letra o número
    function superClean(txt) {
        return String(txt).toLowerCase().replace(/[^a-z0-9]/gi, '');
    }

    function switchTab(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        event.currentTarget.classList.add('active');
    }

    function update() {
        const mes = document.getElementById('mesSelector').value;
        const qRaw = document.getElementById('searchInput').value.toLowerCase();
        const qClean = superClean(qRaw);
        
        let kpi = { f: 0, c: 0, fn: 0, s: 0 };
        let mData = {}, rData = {};

        rawData.forEach(row => {
            if (String(row[0]).trim() === "88" && String(row[14]).trim() === mes) {
                const marca = String(row[16] || "SIN MARCA").trim();
                const rodado = String(row[11]).trim();
                const medida = String(row[13] || "").trim();
                const desc = String(row[9] || "").trim();
                
                // Texto completo original y limpio
                const fullOriginal = (marca + rodado + medida + desc).toLowerCase();
                const fullClean = superClean(marca + rodado + medida + desc);

                // El buscador ahora es infalible: busca en el original O en el limpio
                if (fullOriginal.includes(qRaw) || fullClean.includes(qClean)) {
                    const imp = parseNum(row[6]);
                    const can = parseNum(row[5]);
                    const isServ = String(row[10]).trim() === "A_SERVICIO";

                    kpi.f += imp;
                    if (rodado !== "" && !isNaN(rodado)) {
                        kpi.c += can;
                        kpi.fn += imp;
                        if (!rData[rodado]) rData[rodado] = { c: 0, f: 0 };
                        rData[rodado].c += can; rData[rodado].f += imp;
                    }
                    if (isServ) kpi.s += imp;
                    if (!mData[marca]) mData[marca] = { c: 0, f: 0 };
                    mData[marca].c += can; mData[marca].f += imp;
                }
            }
        });

        const fmt = (n) => '$ ' + Math.floor(n).toLocaleString('es-AR');
        
        // Carga de KPIs
        document.getElementById('kpiFact').innerText = fmt(kpi.f);
        document.getElementById('kpiCant').innerText = kpi.c.toLocaleString('es-AR') + ' u.';
        document.getElementById('kpiFactNeu').innerText = fmt(kpi.fn);
        document.getElementById('kpiProm').innerText = kpi.c > 0 ? fmt(kpi.fn / kpi.c) : '$ 0';
        document.getElementById('kpiServ').innerText = fmt(kpi.s);

        // Tabla Home (Top 10)
        const sortedMarcas = Object.entries(mData).sort((a,b) => b[1].f - a[1].f);
        document.querySelector('#tablaMarcasHome tbody').innerHTML = sortedMarcas.slice(0, 10).map(([m, v]) => {
            const share = kpi.f > 0 ? (v.f / kpi.f * 100).toFixed(1) : 0;
            return `<tr><td>${m}</td><td class="num">${share}%</td><td class="num">${fmt(v.f)}</td></tr>`;
        }).join('');

        // Tabla Full Marcas
        document.querySelector('#tablaMarcasFull tbody').innerHTML = sortedMarcas.map(([m, v]) => 
            `<tr><td>${m}</td><td class="num">${v.c} u.</td><td class="num">${fmt(v.f)}</td></tr>`
        ).join('');

        // Tabla Rodados
        document.querySelector('#tablaRodados tbody').innerHTML = Object.entries(rData)
            .sort((a,b) => parseInt(a[0]) - parseInt(b[0]))
            .map(([r, v]) => `<tr><td><span class="tag">R${r}</span></td><td class="num">${v.c} u.</td><td class="num">${fmt(v.f)}</td></tr>`).join('');
    }
    init();
</script>
</body>
</html>
