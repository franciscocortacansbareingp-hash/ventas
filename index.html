<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Total Compañía</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <style>
        :root {
            --bg-color: #f4f7f6;
            --card-bg: #ffffff;
            --text-main: #2d3436;
            --accent: #00b894;
            --secondary: #0984e3;
        }
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: var(--bg-color); 
            color: var(--text-main);
            margin: 0;
            padding: 20px;
        }
        .container { max-width: 900px; margin: auto; }
        .header { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            margin-bottom: 30px; 
            border-bottom: 2px solid #dfe6e9;
            padding-bottom: 10px;
        }
        .metric-card {
            background: var(--card-bg);
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            margin-bottom: 20px;
        }
        .label { font-size: 0.9rem; font-weight: 600; color: #636e72; text-transform: uppercase; }
        .main-value { font-size: 2.5rem; font-weight: 700; margin: 10px 0; color: var(--secondary); }
        .incidencia-tag {
            background: var(--accent);
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            margin-left: 10px;
        }
        select {
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #ced4da;
            font-size: 1rem;
            outline: none;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>Análisis Total Empresa</h1>
        <select id="mesSelector"><option>Cargando meses...</option></select>
    </div>

    <!-- Facturación Total -->
    <div class="metric-card">
        <span class="label">Facturación Total Bruta</span>
        <div id="f-val" class="main-value">$ 0,00</div>
    </div>

    <!-- Servicios -->
    <div class="metric-card">
        <span class="label">Venta de Servicios <span id="i-val" class="incidencia-tag">0,00% Incidencia</span></span>
        <div id="s-val" class="main-value">$ 0,00</div>
    </div>
</div>

<script>
    // Configuración de URLs (Mantenemos tus GIDs originales)
    const URL_PUB = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSCmHe-75PjLOZxC8rj9ZiRx58SU0crBtp9FGokKFYUIN3FSONy7091EQPrVZWmHrkuXEuK-rg3uCx4/pub?output=csv';
    const GID_VENTAS = '0';
    const GID_OBJETIVOS = '257732281'; 

    let rawVentas = [];
    let metasMap = {};

    // LÓGICA DE LIMPIEZA DE DINERO (REPLICADA)
    function parseNum(v) {
        if (!v || v === "" || v === "-" || v === " ") return 0;
        let s = String(v).trim().replace(/[$\s]/g, '');
        if (s.includes(',') && s.includes('.')) {
            s = s.replace(/\./g, '').replace(',', '.');
        } else if (s.includes(',')) {
            s = s.replace(',', '.');
        }
        let n = parseFloat(s);
        return isNaN(n) ? 0 : n;
    }

    async function init() {
        // 1. Cargar Metas/Objetivos
        Papa.parse(`${URL_PUB}&gid=${GID_OBJETIVOS}`, {
            download: true, header: true, skipEmptyLines: true,
            complete: function(results) {
                results.data.forEach(row => {
                    if (row["Mes"]) {
                        metasMap[row["Mes"].trim().toLowerCase()] = {
                            f: parseNum(row["Facturacion"]),
                            s: parseNum(row["Servicios"])
                        };
                    }
                });
                cargarVentas();
            }
        });
    }

    function cargarVentas() {
        // 2. Cargar Ventas Reales
        Papa.parse(`${URL_PUB}&gid=${GID_VENTAS}`, {
            download: true, header: false, skipEmptyLines: true,
            complete: function(results) {
                rawVentas = results.data;
                
                // Extraer meses únicos de la columna 14
                const mesesRaw = rawVentas.map(r => String(r[14] || "").trim()).filter(m => m !== "" && m.toLowerCase() !== "mes");
                const mesesUnicos = [...new Set(mesesRaw)];
                
                const sel = document.getElementById('mesSelector');
                sel.innerHTML = mesesUnicos.map(m => `<option value="${m.toLowerCase()}">${m}</option>`).join('');
                sel.addEventListener('change', update);
                
                update();
            }
        });
    }

    function update() {
        const mesSel = document.getElementById('mesSelector').value.trim().toLowerCase();
        let real = { f: 0, s: 0 };

        rawVentas.forEach((row, index) => {
            if (index === 0 || row.length < 15) return; 
            
            const mesRow = String(row[14] || "").trim().toLowerCase();

            // LÓGICA TOTAL: Solo filtramos por MES. 
            // Se quitan los filtros de sucursal (row[0]) y actividad (row[8]).
            if (mesRow === mesSel) {
                const imp = parseNum(row[6]); // Importe en columna 6
                real.f += imp;
                
                // Identificación de Servicios
                const rango = String(row[10] || "").trim().toUpperCase();
                if (rango === "A_SERVICIO") {
                    real.s += imp;
                }
            }
        });

        // Formateo y renderizado
        const fmt = (n) => n.toLocaleString('es-AR', { 
            minimumFractionDigits: 2, 
            maximumFractionDigits: 2 
        });

        document.getElementById('f-val').innerText = '$ ' + fmt(real.f);
        document.getElementById('s-val').innerText = '$ ' + fmt(real.s);
        
        // Cálculo de Incidencia
        const inc = real.f > 0 ? (real.s / real.f * 100) : 0;
        document.getElementById('i-val').innerText = fmt(inc) + '% Incidencia';
    }

    init();
</script>
</body>
</html>
