<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Barein Dashboard</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0a; --surface: #141414; --border: #262626; 
            --text: #f0f0f0; --muted: #a0a0a0; --accent: #6366f1;
            --row-hover: rgba(255, 255, 255, 0.03);
        }

        body.light-mode {
            --bg: #f5f5f7; --surface: #ffffff; --border: #e2e2e7;
            --text: #1d1d1f; --muted: #86868b; --accent: #4338ca;
            --row-hover: rgba(0, 0, 0, 0.03);
        }

        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; transition: background 0.3s, color 0.3s; }
        
        .nav { background: var(--surface); border-bottom: 1px solid var(--border); padding: 15px 25px; display: flex; gap: 20px; align-items: flex-end; position: sticky; top: 0; z-index: 1000; }
        .brand { font-weight: 800; color: var(--accent); font-size: 1.2rem; letter-spacing: 1px; margin-right: 10px; padding-bottom: 5px; }
        
        .filter-group { display: flex; flex-direction: column; gap: 5px; }
        .filter-label { font-size: 10px; color: var(--accent); font-weight: 800; text-transform: uppercase; letter-spacing: 0.5px; }
        
        input, select { background: var(--bg); border: 1px solid var(--border); color: var(--text); padding: 10px; border-radius: 8px; font-size: 13px; outline: none; }

        .theme-toggle { margin-left: auto; background: var(--accent); color: white; border: none; padding: 10px 15px; border-radius: 8px; cursor: pointer; font-weight: 700; font-size: 12px; }

        .multiselect { position: relative; width: 220px; }
        .selectBox { position: relative; cursor: pointer; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 10px; font-size: 13px; min-height: 18px; }
        #checkboxes { 
            display: none; border: 1px solid var(--border); background: var(--surface); 
            position: absolute; width: 100%; z-index: 1001; border-radius: 8px; margin-top: 5px;
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.3);
        }
        #checkboxes label { display: flex; align-items: center; padding: 10px; font-size: 13px; cursor: pointer; }
        #checkboxes label:hover { background: var(--row-hover); }

        .tabs { display: flex; justify-content: center; gap: 25px; margin: 25px 0; border-bottom: 1px solid var(--border); }
        .tab-btn { background: none; border: none; color: var(--muted); padding: 12px 20px; font-weight: 700; cursor: pointer; border-bottom: 3px solid transparent; transition: 0.2s; }
        .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }

        .container { max-width: 1400px; margin: auto; padding: 0 20px; }
        .page { display: none; }
        .page.active { display: block; }

        .grid-kpi { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; margin-bottom: 40px; }
        .card { background: var(--surface); padding: 25px; border-radius: 16px; border: 1px solid var(--border); }
        .label { font-size: 11px; color: var(--muted); text-transform: uppercase; font-weight: 800; margin-bottom: 12px; display: block; }
        .value { font-size: 1.8rem; font-weight: 800; color: var(--text); }
        .sub-value { color: var(--accent); font-size: 0.9rem; margin-top: 8px; font-weight: 600; }

        .table-container { background: var(--surface); border-radius: 16px; border: 1px solid var(--border); overflow: hidden; margin-bottom: 40px; }
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 15px 20px; font-size: 11px; color: var(--muted); border-bottom: 1px solid var(--border); }
        td { padding: 15px 20px; border-bottom: 1px solid var(--border); font-size: 14px; }
        
        .rodado-header { cursor: pointer; transition: background 0.2s; }
        .rodado-header:hover { background: var(--row-hover); }
        .detalle-desc { display: none; background: rgba(128, 128, 128, 0.05); }
        .detalle-desc td { padding: 12px 30px; font-size: 12px; border-bottom: 1px solid var(--border); }
        .desc-text { color: var(--muted); font-weight: 500; }
        
        .num { text-align: right; font-weight: 700; }
        .tag { background: var(--accent); color: white; padding: 4px 8px; border-radius: 6px; font-size: 11px; font-weight: 800; }
    </style>
</head>
<body>

<div class="nav">
    <div class="brand">BAREIN DASHBOARD</div>
    <div class="filter-group">
        <span class="filter-label">Mes</span>
        <select id="mesSelector" style="width: 130px;"></select>
    </div>
    <div class="filter-group">
        <span class="filter-label">Actividades</span>
        <div class="multiselect">
            <div class="selectBox" onclick="toggleCheckboxes()">
                <div id="selectedDisplay">Seleccionar...</div>
            </div>
            <div id="checkboxes">
                <label><input type="checkbox" value="1" checked onchange="update()"> 1 - Mostrador</label>
                <label><input type="checkbox" value="5" checked onchange="update()"> 5 - Empresa</label>
                <label><input type="checkbox" value="10" onchange="update()"> 10 - Reventa</label>
                <label><input type="checkbox" value="15" onchange="update()"> 15 - Seguros</label>
                <label><input type="checkbox" value="20" onchange="update()"> 20 - Competición</label>
                <label><input type="checkbox" value="30" onchange="update()"> 30 - Marketplace</label>
                <label><input type="checkbox" value="40" onchange="update()"> 40 - Redes</label>
                <label><input type="checkbox" value="50" onchange="update()"> 50 - Logística</label>
                <label><input type="checkbox" value="NADA" onchange="update()"> Sin Identificar</label>
            </div>
        </div>
    </div>
    <div class="filter-group search-box">
        <span class="filter-label">Buscador</span>
        <input type="text" id="searchInput" placeholder="Marca, rodado o descripción...">
    </div>
    <button class="theme-toggle" onclick="toggleTheme()">🌓 MODO</button>
</div>

<div class="tabs">
    <button class="tab-btn active" onclick="switchTab('general')">PERFORMANCE GENERAL</button>
    <button class="tab-btn" onclick="switchTab('detallado')">DETALLE PRODUCTOS</button>
</div>

<div class="container">
    <div id="general" class="page active">
        <div class="grid-kpi">
            <div class="card"><span class="label">Facturación Total</span><div id="kpiFact" class="value">$ 0</div></div>
            <div class="card"><span class="label">Volumen Neumáticos</span><div id="kpiCant" class="value">0 u.</div><div id="kpiFactNeu" class="sub-value">$ 0</div></div>
            <div class="card"><span class="label">Servicios</span><div id="kpiServ" class="value">$ 0</div><div id="kpiIncid" class="sub-value">0% Incidencia</div></div>
            <div class="card"><span class="label">Ticket Promedio</span><div id="kpiProm" class="value">$ 0</div></div>
        </div>
        <div class="table-container">
            <table id="tablaMarcasHome">
                <thead><tr><th>Marca</th><th class="num">Share %</th><th class="num">Total Facturado</th></tr></thead>
                <tbody></tbody>
            </table>
        </div>
    </div>

    <div id="detallado" class="page">
        <div class="table-container">
            <table id="tablaRodados">
                <thead><tr><th>Rodado (Click para ver detalle)</th><th class="num">Unidades</th><th class="num">Importe ML</th></tr></thead>
                <tbody id="rodadosBody"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    const URL_PUB = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSCmHe-75PjLOZxC8rj9ZiRx58SU0crBtp9FGokKFYUIN3FSONy7091EQPrVZWmHrkuXEuK-rg3uCx4/pub?output=csv';
    let rawData = [];
    let expanded = false;

    function toggleTheme() { document.body.classList.toggle('light-mode'); }
    function toggleCheckboxes() {
        const checkboxes = document.getElementById("checkboxes");
        checkboxes.style.display = expanded ? "none" : "block";
        expanded = !expanded;
    }
    function toggleRow(id) {
        const rows = document.querySelectorAll(`.desc-${id}`);
        rows.forEach(r => r.style.display = r.style.display === 'table-row' ? 'none' : 'table-row');
    }

    function parseNum(v) {
        if (!v || v === "" || v === "-" || v === " ") return 0;
        let s = String(v).trim().replace(/[$\s]/g, '');
        if (s.includes(',') && s.includes('.')) s = s.replace(/\./g, '').replace(',', '.');
        else if (s.includes(',')) s = s.replace(',', '.');
        let n = parseFloat(s);
        return isNaN(n) ? 0 : n;
    }

    const fmt = (n) => '$ ' + Math.floor(n).toLocaleString('es-AR');
    const fmtNum = (n) => n.toLocaleString('es-AR');

    function init() {
        Papa.parse(URL_PUB, {
            download: true,
            header: false,
            complete: (results) => {
                rawData = results.data;
                const meses = [...new Set(rawData.map(r => String(r[14] || "").trim()))].filter(m => m && m.toLowerCase() !== 'mes');
                const selMes = document.getElementById('mesSelector');
                selMes.innerHTML = meses.map(m => `<option value="${m}">${m}</option>`).join('');
                selMes.addEventListener('change', update);
                document.getElementById('searchInput').addEventListener('input', update);
                update();
            }
        });
    }

    function switchTab(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        event.currentTarget.classList.add('active');
    }

    function update() {
        const mesSel = document.getElementById('mesSelector').value;
        const search = document.getElementById('searchInput').value.toLowerCase().trim();
        const tokens = search.split(' ').filter(t => t !== '');
        const checkedBoxes = Array.from(document.querySelectorAll('#checkboxes input:checked')).map(cb => cb.value);
        
        document.getElementById('selectedDisplay').innerText = `Actividades: ${checkedBoxes.length}`;

        let kpi = { f: 0, c: 0, fn: 0, s: 0 };
        let mData = {}, rData = {};

        rawData.forEach((row, index) => {
            if (index === 0 || row.length < 15) return;
            if (String(row[14] || "").trim() !== mesSel) return;

            const actRow = String(row[8] || "").trim();
            const valorActRow = (actRow === "" || actRow === "0") ? "NADA" : actRow;
            if (!checkedBoxes.includes(valorActRow)) return;

            const marca = String(row[16] || "").toLowerCase();
            const desc = String(row[9] || "").toLowerCase();
            const rodado = String(row[11] || "").trim();
            const fullText = `${marca} ${desc} ${rodado}`;
            if (!tokens.every(t => fullText.includes(t))) return;

            const imp = parseNum(row[6]);
            const can = parseFloat(String(row[5]).replace(',', '.')) || 0;
            const esServicio = String(row[10]).trim().toUpperCase() === "A_SERVICIO";

            kpi.f += imp;
            if (!esServicio && rodado !== "" && rodado !== "0") {
                kpi.c += can;
                kpi.fn += imp;
                if (!rData[rodado]) rData[rodado] = { c: 0, f: 0, details: {} };
                rData[rodado].c += can;
                rData[rodado].f += imp;
                
                const dKey = String(row[9] || "Sin descripción").toUpperCase();
                if (!rData[rodado].details[dKey]) rData[rodado].details[dKey] = { c: 0, f: 0 };
                rData[rodado].details[dKey].c += can;
                rData[rodado].details[dKey].f += imp;
            }
            if (esServicio) kpi.s += imp;

            const mKey = marca.toUpperCase() || "OTRO";
            if (!mData[mKey]) mData[mKey] = { c: 0, f: 0 };
            mData[mKey].c += can;
            mData[mKey].f += imp;
        });

        document.getElementById('kpiFact').innerText = fmt(kpi.f);
        document.getElementById('kpiCant').innerText = fmtNum(kpi.c) + ' u.';
        document.getElementById('kpiFactNeu').innerText = fmt(kpi.fn);
        document.getElementById('kpiServ').innerText = fmt(kpi.s);
        document.getElementById('kpiIncid').innerText = (kpi.f > 0 ? (kpi.s / kpi.f * 100).toFixed(1) : 0) + '% Incidencia';
        document.getElementById('kpiProm').innerText = kpi.c > 0 ? fmt(kpi.fn / kpi.c) : '$ 0';

        const sortedM = Object.entries(mData).sort((a,b) => b[1].f - a[1].f);
        document.querySelector('#tablaMarcasHome tbody').innerHTML = sortedM.slice(0, 10).map(([m, v]) => `
            <tr><td>${m}</td><td class="num">${kpi.f > 0 ? (v.f/kpi.f*100).toFixed(1) : 0}%</td><td class="num">${fmt(v.f)}</td></tr>
        `).join('');

        const rodadosHtml = Object.entries(rData)
            .sort((a,b) => parseInt(a[0]) - parseInt(b[0]))
            .map(([r, v], idx) => {
                const detailRows = Object.entries(v.details)
                    .sort((a,b) => b[1].f - a[1].f) // Ordenar por importe las descripciones
                    .map(([d, val]) => `
                        <tr class="detalle-desc desc-${idx}">
                            <td class="desc-text">${d}</td>
                            <td class="num">${fmtNum(val.c)} u.</td>
                            <td class="num">${fmt(val.f)}</td>
                        </tr>`).join('');

                return `
                    <tr class="rodado-header" onclick="toggleRow(${idx})">
                        <td><span class="tag">R${r}</span> <small>▾</small></td>
                        <td class="num">${fmtNum(v.c)} u.</td>
                        <td class="num">${fmt(v.f)}</td>
                    </tr>
                    ${detailRows}
                `;
            }).join('');
        
        document.getElementById('rodadosBody').innerHTML = rodadosHtml;
    }
    init();
</script>
</body>
</html>
