<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Barein Ventas</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0a; --surface: #141414; --border: #262626; 
            --text: #f0f0f0; --muted: #a0a0a0; --accent: #6366f1;
        }
        .light-mode {
            --bg: #f5f5f7; --surface: #ffffff; --border: #e0e0e0; 
            --text: #1d1d1f; --muted: #6e6e73; --accent: #4f46e5;
        }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; transition: background 0.3s; }
        .nav { background: var(--surface); border-bottom: 1px solid var(--border); padding: 15px 25px; position: sticky; top: 0; z-index: 100; }
        .nav-container { max-width: 1300px; margin: auto; display: flex; gap: 20px; align-items: center; }
        .search-box { flex-grow: 1; }
        input, select { background: var(--bg); border: 1px solid var(--border); color: var(--text); padding: 10px 15px; border-radius: 8px; outline: none; font-size: 14px; font-family: 'Inter', sans-serif; }
        #searchInput { width: 100%; box-sizing: border-box; }
        .tabs { display: flex; justify-content: center; gap: 10px; margin: 20px 0; }
        .tab-btn { background: none; border: none; color: var(--muted); padding: 10px 20px; font-weight: 600; cursor: pointer; border-bottom: 2px solid transparent; font-family: 'Inter', sans-serif; }
        .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }
        .container { max-width: 1300px; margin: 0 auto 50px; padding: 0 20px; }
        .page { display: none; }
        .page.active { display: block; }
        
        /* Ajuste de KPIs para evitar que se corran los números */
        .grid-kpi { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 15px; margin-bottom: 30px; }
        .card { background: var(--surface); padding: 20px; border-radius: 12px; border: 1px solid var(--border); overflow: hidden; }
        .label { font-size: 10px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; display: block; }
        .value { font-size: 1.5rem; font-weight: 800; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; line-height: 1.2; }
        .sub-value-main { font-size: 0.95rem; font-weight: 600; margin-top: 4px; color: var(--muted); }

        .section-header { margin: 40px 0 20px; display: flex; align-items: center; gap: 15px; }
        .section-header h3 { margin: 0; font-size: 1rem; text-transform: uppercase; }
        .line { height: 1px; background: var(--border); flex-grow: 1; }
        table { width: 100%; border-collapse: collapse; background: var(--surface); border-radius: 12px; overflow: hidden; margin-bottom: 30px; table-layout: fixed; }
        th { background: rgba(255,255,255,0.03); padding: 12px 15px; text-align: left; font-size: 10px; color: var(--muted); text-transform: uppercase; }
        td { padding: 12px 15px; border-bottom: 1px solid var(--border); font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .num { text-align: right; font-weight: 600; width: 30%; }
        .tag-rodado { background: var(--accent); color: white; padding: 2px 6px; border-radius: 4px; font-size: 10px; }
    </style>
</head>
<body>

<div class="nav">
    <div class="nav-container">
        <h2 style="margin:0; font-size: 1.1rem; color: var(--accent);">Barein <span style="color:var(--text)">Ventas</span></h2>
        <select id="mesSelector"><option>Cargando...</option></select>
        <div class="search-box"><input type="text" id="searchInput" placeholder="Ej: 175 70 13 o 175*70*13..."></div>
        <button onclick="document.body.classList.toggle('light-mode')" style="background:none; border:none; cursor:pointer;">🌓</button>
    </div>
</div>

<div class="tabs">
    <button class="tab-btn active" onclick="switchTab('general')">GLOBAL</button>
    <button class="tab-btn" onclick="switchTab('detallado')">DETALLE</button>
</div>

<div class="container">
    <div id="general" class="page active">
        <div class="grid-kpi">
            <div class="card">
                <span class="label">Facturación Total</span>
                <div id="kpiFact" class="value">$ 0</div>
            </div>
            <div class="card">
                <span class="label">Volumen Neumáticos</span>
                <div id="kpiCant" class="value">0 u.</div>
                <div id="kpiFactNeu" class="sub-value-main">$ 0</div>
            </div>
            <div class="card">
                <span class="label">Ticket Promedio</span>
                <div id="kpiProm" class="value">$ 0</div>
            </div>
            <div class="card">
                <span class="label">Venta de Servicios</span>
                <div id="kpiServ" class="value">$ 0</div>
            </div>
        </div>

        <div class="section-header"><h3>Top Marcas</h3><div class="line"></div></div>
        <table id="tablaMarcasHome">
            <thead><tr><th>Marca</th><th class="num">Share</th><th class="num">Total</th></tr></thead>
            <tbody></tbody>
        </table>
    </div>

    <div id="detallado" class="page">
        <div class="section-header"><h3>Ranking de Rodados</h3><div class="line"></div></div>
        <table id="tablaRodados">
            <thead><tr><th>Rodado</th><th class="num">Unidades</th><th class="num">Total ML</th></tr></thead>
            <tbody></tbody>
        </table>
    </div>
</div>

<script>
    const SHEET_URL = 'https://docs.google.com/spreadsheets/d/1gddLz0WmuvjDPicMY4O5uhQpe0tOL8wFmMtYzuIBi5g/export?format=csv';
    let rawData = [];

    function init() {
        Papa.parse(SHEET_URL, {
            download: true,
            complete: (results) => {
                rawData = results.data;
                const meses = [...new Set(rawData.map(r => String(r[14]).trim()))].filter(m => m && m.toLowerCase() !== 'mes');
                const sel = document.getElementById('mesSelector');
                sel.innerHTML = meses.map(m => `<option value="${m}">${m}</option>`).join('');
                sel.addEventListener('change', update);
                document.getElementById('searchInput').addEventListener('input', update);
                update();
            }
        });
    }

    function parse(v) { if(!v) return 0; let s = String(v).replace(/[$\s]/g, '').replace(/,/g, ''); return parseFloat(s) || 0; }
    
    // Función de limpieza mejorada para el buscador
    function clean(txt) {
        return String(txt).toLowerCase().replace(/[^a-z0-9]/gi, '');
    }

    function switchTab(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        event.currentTarget.classList.add('active');
    }

    function update() {
        const mes = document.getElementById('mesSelector').value;
        const queryRaw = document.getElementById('searchInput').value.toLowerCase();
        const queryClean = clean(queryRaw);
        
        let kpi = { f: 0, c: 0, fn: 0, s: 0 };
        let mData = {}, rData = {};

        rawData.forEach(row => {
            const vRow = String(row[0]).trim();
            const mRow = String(row[14]).trim();
            
            if (vRow === "88" && mRow === mes) {
                const marca = String(row[16] || "").toLowerCase();
                const rodado = String(row[11]).trim();
                const medida = String(row[13] || "").toLowerCase();
                const desc = String(row[9] || "").toLowerCase();
                
                // Busca coincidencia en el texto real O en el texto limpio
                const matchOriginal = (marca + rodado + medida + desc).includes(queryRaw);
                const matchClean = clean(marca + rodado + medida + desc).includes(queryClean);

                if (matchOriginal || matchClean) {
                    const imp = parse(row[6]);
                    const can = parse(row[5]);
                    const isServ = String(row[10]).trim() === "A_SERVICIO";

                    kpi.f += imp;
                    if (rodado !== "" && !isNaN(rodado)) {
                        kpi.c += can;
                        kpi.fn += imp;
                        if (!rData[rodado]) rData[rodado] = { c: 0, f: 0 };
                        rData[rodado].c += can; rData[rodado].f += imp;
                    }
                    if (isServ) kpi.s += imp;
                    if (!mData[marca.toUpperCase()]) mData[marca.toUpperCase()] = { c: 0, f: 0 };
                    mData[marca.toUpperCase()].c += can; mData[marca.toUpperCase()].f += imp;
                }
            }
        });

        const fmt = (n) => '$ ' + Math.floor(n).toLocaleString('es-AR');
        
        document.getElementById('kpiFact').innerText = fmt(kpi.f);
        document.getElementById('kpiCant').innerText = kpi.c.toLocaleString('es-AR') + ' u.';
        document.getElementById('kpiFactNeu').innerText = fmt(kpi.fn);
        document.getElementById('kpiProm').innerText = kpi.c > 0 ? fmt(kpi.fn / kpi.c) : '$ 0';
        document.getElementById('kpiServ').innerText = fmt(kpi.s);

        const topMarcas = Object.entries(mData).sort((a,b) => b[1].f - a[1].f).slice(0, 8);
        document.querySelector('#tablaMarcasHome tbody').innerHTML = topMarcas.map(([m, v]) => {
            const perc = kpi.f > 0 ? (v.f / kpi.f * 100).toFixed(1) : 0;
            return `<tr><td>${m}</td><td class="num">${perc}%</td><td class="num">${fmt(v.f)}</td></tr>`;
        }).join('');

        document.querySelector('#tablaRodados tbody').innerHTML = Object.entries(rData)
            .sort((a,b) => parseInt(a[0]) - parseInt(b[0]))
            .map(([r, v]) => `<tr><td><span class="tag-rodado">R${r}</span></td><td class="num">${v.c}</td><td class="num">${fmt(v.f)}</td></tr>`).join('');
    }
    init();
</script>
</body>
</html>
