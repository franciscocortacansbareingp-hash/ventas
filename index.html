<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Barein Dashboard</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0a; --surface: #141414; --border: #262626; 
            --text: #f0f0f0; --muted: #a0a0a0; --accent: #6366f1;
        }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; overflow-x: hidden; }
        
        .nav { background: var(--surface); border-bottom: 1px solid var(--border); padding: 15px 25px; display: flex; gap: 20px; align-items: center; position: sticky; top: 0; z-index: 100; flex-wrap: wrap; }
        .search-box { flex-grow: 1; min-width: 250px; }
        input, select { background: var(--bg); border: 1px solid var(--border); color: var(--text); padding: 12px; border-radius: 8px; font-size: 14px; width: 100%; box-sizing: border-box; outline: none; }
        input:focus { border-color: var(--accent); }

        .tabs { display: flex; justify-content: center; gap: 25px; margin: 25px 0; border-bottom: 1px solid var(--border); }
        .tab-btn { background: none; border: none; color: var(--muted); padding: 12px 20px; font-weight: 700; cursor: pointer; border-bottom: 3px solid transparent; transition: 0.2s; font-size: 13px; }
        .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }

        .container { max-width: 1400px; margin: auto; padding: 0 20px; }
        .page { display: none; animation: fadeIn 0.3s ease; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .grid-kpi { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; margin-bottom: 40px; }
        .card { background: var(--surface); padding: 25px; border-radius: 16px; border: 1px solid var(--border); display: flex; flex-direction: column; justify-content: center; min-height: 120px; }
        .label { font-size: 11px; color: var(--muted); text-transform: uppercase; font-weight: 800; margin-bottom: 12px; letter-spacing: 0.5px; }
        .value { font-size: 1.8rem; font-weight: 800; line-height: 1.1; color: var(--text); word-break: break-word; }
        .sub-value { color: var(--muted); font-size: 1rem; margin-top: 8px; font-weight: 600; }

        .section-header { margin: 40px 0 20px; display: flex; align-items: center; gap: 15px; color: var(--accent); font-weight: 800; text-transform: uppercase; font-size: 0.85rem; }
        .line { height: 1px; background: var(--border); flex-grow: 1; }

        .table-container { background: var(--surface); border-radius: 16px; border: 1px solid var(--border); overflow-x: auto; margin-bottom: 40px; }
        table { width: 100%; border-collapse: collapse; min-width: 600px; }
        th { text-align: left; padding: 15px 20px; font-size: 11px; color: var(--muted); background: rgba(255,255,255,0.02); border-bottom: 1px solid var(--border); }
        td { padding: 15px 20px; border-bottom: 1px solid var(--border); font-size: 14px; }
        .num { text-align: right; font-weight: 700; font-variant-numeric: tabular-nums; }
        .tag { background: var(--accent); color: white; padding: 4px 8px; border-radius: 6px; font-size: 11px; font-weight: 800; }
    </style>
</head>
<body>

<div class="nav">
    <div style="font-weight: 800; color: var(--accent); font-size: 1.2rem;">BAREIN<span style="color:white; font-weight:400">DASHBOARD</span></div>
    <div style="width: 140px;"><select id="mesSelector"></select></div>
    <div class="search-box">
        <input type="text" id="searchInput" placeholder="Buscá marca o producto...">
    </div>
</div>

<div class="tabs">
    <button class="tab-btn active" onclick="switchTab('general')">PERFORMANCE GENERAL</button>
    <button class="tab-btn" onclick="switchTab('detallado')">DETALLE DE PRODUCTOS</button>
</div>

<div class="container">
    <div id="general" class="page active">
        <div class="grid-kpi">
            <div class="card"><span class="label">Facturación Total</span><div id="kpiFact" class="value">$ 0</div></div>
            <div class="card"><span class="label">Volumen Neumáticos</span><div id="kpiCant" class="value">0 u.</div><div id="kpiFactNeu" class="sub-value">$ 0</div></div>
            <div class="card"><span class="label">Ticket Promedio</span><div id="kpiProm" class="value">$ 0</div></div>
            <div class="card"><span class="label">Venta de Servicios</span><div id="kpiServ" class="value">$ 0</div></div>
        </div>
        <div class="section-header"><span>Top 10 Marcas</span><div class="line"></div></div>
        <div class="table-container">
            <table id="tablaMarcasHome">
                <thead><tr><th>Marca</th><th class="num">Share</th><th class="num">Total Facturado</th></tr></thead>
                <tbody></tbody>
            </table>
        </div>
    </div>

    <div id="detallado" class="page">
        <div class="section-header"><span>Ventas por Rodado</span><div class="line"></div></div>
        <div class="table-container">
            <table id="tablaRodados">
                <thead><tr><th>Rodado</th><th class="num">Unidades</th><th class="num">Total Facturado</th></tr></thead>
                <tbody></tbody>
            </table>
        </div>
        <div class="section-header"><span>Ranking Completo de Marcas</span><div class="line"></div></div>
        <div class="table-container">
            <table id="tablaMarcasFull">
                <thead><tr><th>Marca</th><th class="num">Unidades</th><th class="num">Total Facturado</th></tr></thead>
                <tbody></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    // URL YA CORREGIDA CON TU ID
    const SHEET_URL = 'https://docs.google.com/spreadsheets/d/1gddLz0WmuvjDPicMY4O5uhQpe0tOL8wFmMtYzuIBi5g/export?format=csv';
    let rawData = [];

    const fmt = (n) => '$ ' + Math.floor(n).toLocaleString('es-AR');

    function init() {
        Papa.parse(SHEET_URL, {
            download: true,
            complete: (results) => {
                rawData = results.data;
                const meses = [...new Set(rawData.map(r => String(r[14]).trim()))].filter(m => m && m.toLowerCase() !== 'mes');
                const sel = document.getElementById('mesSelector');
                sel.innerHTML = meses.map(m => `<option value="${m}">${m}</option>`).join('');
                sel.addEventListener('change', update);
                document.getElementById('searchInput').addEventListener('input', update);
                update();
            }
        });
    }

    function switchTab(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        event.currentTarget.classList.add('active');
    }

    function update() {
        const mes = document.getElementById('mesSelector').value;
        const rawQ = document.getElementById('searchInput').value.toLowerCase();
        const tokens = rawQ.split(' ').filter(t => t.trim() !== '');
        const qClean = rawQ.replace(/[^a-z0-9]/g, '');
        
        let kpi = { f: 0, c: 0, fn: 0, s: 0 };
        let mData = {}, rData = {};

        rawData.forEach(row => {
            if (String(row[0]).trim() === "88" && String(row[14]).trim() === mes) {
                const marca = String(row[16] || "").toLowerCase();
                const medida = String(row[13] || "").toLowerCase();
                const rodado = String(row[11] || "").toLowerCase();
                const desc = String(row[9] || "").toLowerCase();
                
                const fullText = `${marca} ${medida} ${rodado} ${desc}`;
                const fullClean = fullText.replace(/[^a-z0-9]/g, '');
                
                const match = tokens.length === 0 || tokens.every(t => fullText.includes(t) || (t.replace(/[^a-z0-9]/g, '') !== '' && fullClean.includes(t.replace(/[^a-z0-9]/g, ''))));

                if (match) {
                    const imp = parseFloat(String(row[6]).replace(/[$\s]/g, '').replace(/,/g, '')) || 0;
                    const can = parseFloat(row[5]) || 0;
                    const isServ = String(row[10]).trim() === "A_SERVICIO";

                    kpi.f += imp;
                    if (rodado !== "" && !isNaN(rodado)) {
                        kpi.c += can; kpi.fn += imp;
                        if (!rData[rodado]) rData[rodado] = { c: 0, f: 0 };
                        rData[rodado].c += can; rData[rodado].f += imp;
                    }
                    if (isServ) kpi.s += imp;
                    
                    const mKey = marca.toUpperCase() || "OTRO";
                    if (!mData[mKey]) mData[mKey] = { c: 0, f: 0 };
                    mData[mKey].c += can; mData[mKey].f += imp;
                }
            }
        });

        document.getElementById('kpiFact').innerText = fmt(kpi.f);
        document.getElementById('kpiCant').innerText = kpi.c.toLocaleString('es-AR') + ' u.';
        document.getElementById('kpiFactNeu').innerText = fmt(kpi.fn);
        document.getElementById('kpiProm').innerText = kpi.c > 0 ? fmt(kpi.fn / kpi.c) : '$ 0';
        document.getElementById('kpiServ').innerText = fmt(kpi.s);

        const sortedM = Object.entries(mData).sort((a,b) => b[1].f - a[1].f);
        document.querySelector('#tablaMarcasHome tbody').innerHTML = sortedM.slice(0, 10).map(([m, v]) => `
            <tr><td>${m}</td><td class="num">${kpi.f > 0 ? ((v.f/kpi.f)*100).toFixed(1) : 0}%</td><td class="num">${fmt(v.f)}</td></tr>
        `).join('');

        document.querySelector('#tablaMarcasFull tbody').innerHTML = sortedM.map(([m, v]) => `
            <tr><td>${m}</td><td class="num">${v.c} u.</td><td class="num">${fmt(v.f)}</td></tr>
        `).join('');

        document.querySelector('#tablaRodados tbody').innerHTML = Object.entries(rData)
            .sort((a,b) => parseInt(a[0]) - parseInt(b[0]))
            .map(([r, v]) => `<tr><td><span class="tag">R${r}</span></td><td class="num">${v.c} u.</td><td class="num">${fmt(v.f)}</td></tr>`).join('');
    }
    init();
</script>
</body>
</html>
