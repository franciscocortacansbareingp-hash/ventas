<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Barein Dashboard | Total Empresa</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0a; --surface: #141414; --border: #262626; 
            --text: #f0f0f0; --muted: #a0a0a0; --accent: #6366f1;
        }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; overflow-x: hidden; }
        .nav { background: var(--surface); border-bottom: 1px solid var(--border); padding: 15px 25px; display: flex; gap: 15px; align-items: center; position: sticky; top: 0; z-index: 100; flex-wrap: wrap; }
        .search-box { flex-grow: 1; min-width: 200px; }
        input, select { background: var(--bg); border: 1px solid var(--border); color: var(--text); padding: 12px; border-radius: 8px; font-size: 14px; width: 100%; box-sizing: border-box; outline: none; transition: 0.2s; }
        input:focus { border-color: var(--accent); }
        .tabs { display: flex; justify-content: center; gap: 25px; margin: 25px 0; border-bottom: 1px solid var(--border); }
        .tab-btn { background: none; border: none; color: var(--muted); padding: 12px 20px; font-weight: 700; cursor: pointer; border-bottom: 3px solid transparent; transition: 0.2s; font-size: 13px; }
        .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }
        .container { max-width: 1400px; margin: auto; padding: 0 20px; }
        .page { display: none; }
        .page.active { display: block; }
        .grid-kpi { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; margin-bottom: 40px; }
        .card { background: var(--surface); padding: 25px; border-radius: 16px; border: 1px solid var(--border); }
        .label { font-size: 11px; color: var(--muted); text-transform: uppercase; font-weight: 800; margin-bottom: 12px; letter-spacing: 0.5px; display: block; }
        .value { font-size: 1.8rem; font-weight: 800; line-height: 1.1; color: var(--text); }
        .sub-value { color: var(--accent); font-size: 0.9rem; margin-top: 8px; font-weight: 600; }
        .section-header { margin: 40px 0 20px; display: flex; align-items: center; gap: 15px; color: var(--accent); font-weight: 800; text-transform: uppercase; font-size: 0.85rem; }
        .line { height: 1px; background: var(--border); flex-grow: 1; }
        .table-container { background: var(--surface); border-radius: 16px; border: 1px solid var(--border); overflow-x: auto; margin-bottom: 40px; }
        table { width: 100%; border-collapse: collapse; min-width: 600px; }
        th { text-align: left; padding: 15px 20px; font-size: 11px; color: var(--muted); background: rgba(255,255,255,0.02); border-bottom: 1px solid var(--border); }
        td { padding: 15px 20px; border-bottom: 1px solid var(--border); font-size: 14px; }
        .num { text-align: right; font-weight: 700; }
        .tag { background: var(--accent); color: white; padding: 4px 8px; border-radius: 6px; font-size: 11px; font-weight: 800; }
    </style>
</head>
<body>

<div class="nav">
    <div style="font-weight: 800; color: var(--accent); font-size: 1.1rem;">BAREIN<span style="color:white; font-weight:400">TOTAL</span></div>
    <div style="width: 140px;"><select id="mesSelector"></select></div>
    <div class="search-box">
        <input type="text" id="searchInput" placeholder="Buscá por rodado, marca o descripción...">
    </div>
</div>

<div class="tabs">
    <button class="tab-btn active" onclick="switchTab('general')">PERFORMANCE GENERAL</button>
    <button class="tab-btn" onclick="switchTab('detallado')">DETALLE PRODUCTOS</button>
</div>

<div class="container">
    <div id="general" class="page active">
        <div class="grid-kpi">
            <div class="card"><span class="label">Facturación Total</span><div id="kpiFact" class="value">$ 0</div></div>
            <div class="card"><span class="label">Volumen Neumáticos</span><div id="kpiCant" class="value">0 u.</div><div id="kpiFactNeu" class="sub-value">$ 0</div></div>
            <div class="card"><span class="label">Servicios</span><div id="kpiServ" class="value">$ 0</div><div id="kpiIncid" class="sub-value">0% Incidencia</div></div>
            <div class="card"><span class="label">Ticket Promedio (Cubiertas)</span><div id="kpiProm" class="value">$ 0</div></div>
        </div>
        <div class="section-header"><span>Top 10 Marcas (Market Share)</span><div class="line"></div></div>
        <div class="table-container">
            <table id="tablaMarcasHome">
                <thead><tr><th>Marca</th><th class="num">Share %</th><th class="num">Total Facturado</th></tr></thead>
                <tbody></tbody>
            </table>
        </div>
    </div>

    <div id="detallado" class="page">
        <div class="section-header"><span>Ventas por Rodado</span><div class="line"></div></div>
        <div class="table-container">
            <table id="tablaRodados">
                <thead><tr><th>Rodado</th><th class="num">Unidades</th><th class="num">Total Facturado</th></tr></thead>
                <tbody></tbody>
            </table>
        </div>
        <div class="section-header"><span>Ranking de Marcas</span><div class="line"></div></div>
        <div class="table-container">
            <table id="tablaMarcasFull">
                <thead><tr><th>Marca</th><th class="num">Unidades</th><th class="num">Total Facturado</th></tr></thead>
                <tbody></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    const URL_PUB = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSCmHe-75PjLOZxC8rj9ZiRx58SU0crBtp9FGokKFYUIN3FSONy7091EQPrVZWmHrkuXEuK-rg3uCx4/pub?output=csv';
    let rawData = [];

    // LÓGICA DE INTERPRETACIÓN DE DINERO (REPLICADA DE TU DASH ANTERIOR)
    function parseNum(v) {
        if (!v || v === "" || v === "-" || v === " ") return 0;
        let s = String(v).trim().replace(/[$\s]/g, '');
        if (s.includes(',') && s.includes('.')) {
            s = s.replace(/\./g, '').replace(',', '.');
        } else if (s.includes(',')) {
            s = s.replace(',', '.');
        }
        let n = parseFloat(s);
        return isNaN(n) ? 0 : n;
    }

    const fmt = (n) => '$ ' + Math.floor(n).toLocaleString('es-AR');
    const fmtNum = (n) => n.toLocaleString('es-AR');

    function init() {
        Papa.parse(URL_PUB, {
            download: true,
            header: false,
            complete: (results) => {
                rawData = results.data;
                const meses = [...new Set(rawData.map(r => String(r[14] || "").trim()))]
                              .filter(m => m && m.toLowerCase() !== 'mes');
                
                const selMes = document.getElementById('mesSelector');
                selMes.innerHTML = meses.map(m => `<option value="${m}">${m}</option>`).join('');
                
                selMes.addEventListener('change', update);
                document.getElementById('searchInput').addEventListener('input', update);
                update();
            }
        });
    }

    function switchTab(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        event.currentTarget.classList.add('active');
    }

    function update() {
        const mesSel = document.getElementById('mesSelector').value;
        const search = document.getElementById('searchInput').value.toLowerCase().trim();
        const tokens = search.split(' ').filter(t => t !== '');
        
        let kpi = { f: 0, c: 0, fn: 0, s: 0 };
        let mData = {}, rData = {};

        rawData.forEach((row, index) => {
            if (index === 0 || row.length < 15) return;

            const mesRow = String(row[14] || "").trim();
            if (mesRow !== mesSel) return;

            const marca = String(row[16] || "").toLowerCase();
            const desc = String(row[9] || "").toLowerCase();
            const rodado = String(row[11] || "").trim();
            const fullText = `${marca} ${desc} ${rodado}`;

            const matchSearch = tokens.every(t => fullText.includes(t));

            if (matchSearch) {
                const imp = parseNum(row[6]); // Lógica ImporteML aplicada aquí
                const can = parseFloat(String(row[5]).replace(',', '.')) || 0;
                const esServicio = String(row[10]).trim().toUpperCase() === "A_SERVICIO";

                kpi.f += imp; // Suma total empresa

                if (!esServicio && rodado !== "" && rodado !== "0") {
                    kpi.c += can;
                    kpi.fn += imp;
                    if (!rData[rodado]) rData[rodado] = { c: 0, f: 0 };
                    rData[rodado].c += can;
                    rData[rodado].f += imp;
                }

                if (esServicio) kpi.s += imp;

                const mKey = marca.toUpperCase() || "OTRO";
                if (!mData[mKey]) mData[mKey] = { c: 0, f: 0 };
                mData[mKey].c += can;
                mData[mKey].f += imp;
            }
        });

        // Actualizar KPIs
        document.getElementById('kpiFact').innerText = fmt(kpi.f);
        document.getElementById('kpiCant').innerText = fmtNum(kpi.c) + ' u.';
        document.getElementById('kpiFactNeu').innerText = fmt(kpi.fn);
        document.getElementById('kpiServ').innerText = fmt(kpi.s);
        document.getElementById('kpiIncid').innerText = (kpi.f > 0 ? (kpi.s / kpi.f * 100).toFixed(1) : 0) + '% Incidencia';
        document.getElementById('kpiProm').innerText = kpi.c > 0 ? fmt(kpi.fn / kpi.c) : '$ 0';

        // Render Tables
        const sortedM = Object.entries(mData).sort((a,b) => b[1].f - a[1].f);
        document.querySelector('#tablaMarcasHome tbody').innerHTML = sortedM.slice(0, 10).map(([m, v]) => `
            <tr><td>${m}</td><td class="num">${kpi.f > 0 ? (v.f/kpi.f*100).toFixed(1) : 0}%</td><td class="num">${fmt(v.f)}</td></tr>
        `).join('');

        document.querySelector('#tablaMarcasFull tbody').innerHTML = sortedM.map(([m, v]) => `
            <tr><td>${m}</td><td class="num">${fmtNum(v.c)} u.</td><td class="num">${fmt(v.f)}</td></tr>
        `).join('');

        document.querySelector('#tablaRodados tbody').innerHTML = Object.entries(rData)
            .sort((a,b) => parseInt(a[0]) - parseInt(b[0]))
            .map(([r, v]) => `<tr><td><span class="tag">R${r}</span></td><td class="num">${fmtNum(v.c)} u.</td><td class="num">${fmt(v.f)}</td></tr>`).join('');
    }
    init();
</script>
</body>
</html>
