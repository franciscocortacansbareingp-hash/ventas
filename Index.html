<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Barein GP - Ventas Pro</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        /* Variables de color - Estilo Andrés */
        :root {
            --bg: #0a0a0a; --surface: #141414; --border: #262626; 
            --text: #f0f0f0; --muted: #a0a0a0; --accent: #6366f1;
            --success: #3ecf8e; --card-h: #1c1c1c;
        }

        .light-mode {
            --bg: #f5f5f7; --surface: #ffffff; --border: #e0e0e0; 
            --text: #1d1d1f; --muted: #6e6e73; --accent: #4f46e5;
            --success: #059669; --card-h: #f9f9fb;
        }

        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; transition: background 0.3s; }
        
        /* Navbar */
        .nav { 
            background: var(--surface); border-bottom: 1px solid var(--border);
            padding: 15px 25px; position: sticky; top: 0; z-index: 100;
        }
        .nav-container { max-width: 1300px; margin: auto; display: flex; gap: 20px; align-items: center; flex-wrap: wrap; }
        
        .search-box { flex-grow: 1; position: relative; }
        input, select { 
            background: var(--bg); border: 1px solid var(--border); color: var(--text);
            padding: 10px 15px; border-radius: 8px; outline: none; font-size: 14px;
        }
        #searchInput { width: 100%; box-sizing: border-box; }
        
        .btn-theme { 
            background: var(--border); border: none; color: var(--text); 
            padding: 10px; border-radius: 8px; cursor: pointer; font-size: 18px;
        }

        /* Tabs */
        .tabs { display: flex; justify-content: center; gap: 10px; margin: 20px 0; }
        .tab-btn { 
            background: none; border: none; color: var(--muted); padding: 10px 20px;
            font-weight: 600; cursor: pointer; border-bottom: 2px solid transparent;
        }
        .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }

        .container { max-width: 1300px; margin: 0 auto 50px; padding: 0 20px; }
        .page { display: none; }
        .page.active { display: block; }

        /* KPIs */
        .grid-kpi { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; }
        .card { 
            background: var(--surface); padding: 25px; border-radius: 12px; 
            border: 1px solid var(--border); transition: transform 0.2s;
        }
        .card:hover { border-color: var(--accent); }
        .label { font-size: 11px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }
        .value { font-size: 2.2rem; font-weight: 800; margin-top: 10px; color: var(--text); }
        .sub-val { font-size: 14px; color: var(--success); margin-top: 5px; font-weight: 500; }

        /* Tables */
        .section-header { margin: 40px 0 20px; display: flex; align-items: center; gap: 15px; }
        .section-header h3 { margin: 0; font-size: 1.2rem; }
        .line { height: 1px; background: var(--border); flex-grow: 1; }

        table { width: 100%; border-collapse: collapse; background: var(--surface); border-radius: 12px; overflow: hidden; }
        th { background: rgba(255,255,255,0.03); padding: 15px; text-align: left; font-size: 12px; color: var(--muted); text-transform: uppercase; }
        td { padding: 15px; border-bottom: 1px solid var(--border); font-size: 14px; }
        tr:last-child td { border: none; }
        .num { text-align: right; font-family: 'DM Mono', monospace; font-weight: 500; }
        
        .tag-rodado { background: var(--accent); color: white; padding: 3px 8px; border-radius: 4px; font-size: 12px; font-weight: 600; }

        @media (max-width: 768px) { .nav-container { flex-direction: column; align-items: stretch; } }
    </style>
</head>
<body>

<div class="nav">
    <div class="nav-container">
        <h2 style="margin:0; font-size: 1.2rem; color: var(--accent);">Barein <span style="color:var(--text)">Ventas</span></h2>
        <select id="mesSelector"><option>Cargando...</option></select>
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Marca, Código, Medida, Cliente o Razón Social...">
        </div>
        <button class="btn-theme" onclick="toggleTheme()">🌓</button>
    </div>
</div>

<div class="tabs">
    <button class="tab-btn active" onclick="switchTab('general')">RESUMEN GENERAL</button>
    <button class="tab-btn" onclick="switchTab('detallado')">MARCAS Y RODADOS</button>
</div>

<div class="container">
    <div id="general" class="page active">
        <div class="grid-kpi">
            <div class="card">
                <span class="label">Facturación Real</span>
                <div id="kpiFact" class="value">$ 0</div>
                <div class="sub-val">Importe ML Acumulado</div>
            </div>
            <div class="card">
                <span class="label">Unidades Neumáticos</span>
                <div id="kpiCant" class="value">0</div>
                <div class="sub-val">Solo con Rodado asignado</div>
            </div>
            <div class="card">
                <span class="label">Venta Servicios</span>
                <div id="kpiServ" class="value">$ 0</div>
                <div class="sub-val">Rango A_SERVICIO</div>
            </div>
        </div>
    </div>

    <div id="detallado" class="page">
        <div class="section-header"><h3>Ventas por Marca</h3><div class="line"></div></div>
        <table id="tablaMarcas">
            <thead><tr><th>Marca</th><th class="num">Cantidad</th><th class="num">Facturación</th></tr></thead>
            <tbody></tbody>
        </table>

        <div class="section-header"><h3>Ventas por Rodado</h3><div class="line"></div></div>
        <table id="tablaRodados">
            <thead><tr><th>Rodado</th><th class="num">Cantidad</th><th class="num">Facturación</th></tr></thead>
            <tbody></tbody>
        </table>
    </div>
</div>

<script>
    const SHEET_URL = 'https://docs.google.com/spreadsheets/d/1gddLz0WmuvjDPicMY4O5uhQpe0tOL8wFmMtYzuIBi5g/edit?gid=0#gid=0';
    let rawData = [];

    function init() {
        Papa.parse(SHEET_URL, {
            download: true,
            complete: (results) => {
                rawData = results.data;
                const meses = [...new Set(rawData.map(r => String(r[14]).trim()))].filter(m => m && m.toLowerCase() !== 'mes');
                const sel = document.getElementById('mesSelector');
                sel.innerHTML = meses.map(m => `<option value="${m}">${m}</option>`).join('');
                sel.addEventListener('change', update);
                document.getElementById('searchInput').addEventListener('input', update);
                update();
            }
        });
    }

    function parse(v) {
        if(!v) return 0;
        let s = String(v).replace(/[$\s]/g, '').replace(/,/g, '');
        return parseFloat(s) || 0;
    }

    function switchTab(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        event.currentTarget.classList.add('active');
    }

    function toggleTheme() {
        document.body.classList.toggle('light-mode');
    }

    function update() {
        const mes = document.getElementById('mesSelector').value;
        const q = document.getElementById('searchInput').value.toLowerCase();
        
        let kpi = { f: 0, c: 0, s: 0 };
        let mData = {}, rData = {};

        rawData.forEach(row => {
            const vRow = String(row[0]).trim();
            const mRow = String(row[14]).trim();
            if (vRow === "88" && mRow === mes) {
                const marca = String(row[16] || "SIN MARCA").trim();
                const cod = String(row[4] || "").toLowerCase();
                const desc = String(row[9] || "").toLowerCase();
                const cliId = String(row[1] || "").toLowerCase();
                const cliRS = String(row[2] || "").toLowerCase();
                const rodado = String(row[11]).trim();

                // Buscador inteligente
                if (marca.toLowerCase().includes(q) || cod.includes(q) || desc.includes(q) || cliId.includes(q) || cliRS.includes(q)) {
                    const imp = parse(row[6]);
                    const can = parse(row[5]);
                    const isServ = String(row[10]).trim() === "A_SERVICIO";

                    kpi.f += imp;
                    if (rodado !== "" && !isNaN(rodado)) {
                        kpi.c += can;
                        if (!rData[rodado]) rData[rodado] = { c: 0, f: 0 };
                        rData[rodado].c += can;
                        rData[rodado].f += imp;
                    }
                    if (isServ) kpi.s += imp;

                    if (!mData[marca]) mData[marca] = { c: 0, f: 0 };
                    mData[marca].c += can;
                    mData[marca].f += imp;
                }
            }
        });

        // Render KPIs
        document.getElementById('kpiFact').innerText = '$ ' + Math.floor(kpi.f).toLocaleString('es-AR');
        document.getElementById('kpiCant').innerText = kpi.c.toLocaleString('es-AR') + ' u.';
        document.getElementById('kpiServ').innerText = '$ ' + Math.floor(kpi.s).toLocaleString('es-AR');

        // Render Tablas
        const fmt = (n) => '$ ' + Math.floor(n).toLocaleString('es-AR');
        
        document.querySelector('#tablaMarcas tbody').innerHTML = Object.entries(mData)
            .sort((a,b) => b[1].f - a[1].f)
            .map(([m, v]) => `<tr><td>${m}</td><td class="num">${v.c}</td><td class="num">${fmt(v.f)}</td></tr>`).join('');

        document.querySelector('#tablaRodados tbody').innerHTML = Object.entries(rData)
            .sort((a,b) => parseInt(a[0]) - parseInt(b[0]))
            .map(([r, v]) => `<tr><td><span class="tag-rodado">Rodado ${r}</span></td><td class="num">${v.c}</td><td class="num">${fmt(v.f)}</td></tr>`).join('');
    }

    init();
</script>
</body>
</html>
